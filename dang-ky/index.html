<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Learn & Share | Aristino</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.2/slimselect.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.2/slimselect.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1D713A; --accent: #FB8C00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); margin-top: 20px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 1.5rem; text-transform: uppercase; font-weight: 800; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(29, 113, 58, 0.2); }
        input[readonly] { background-color: #f9f9f9; color: #666; font-style: italic; }
        #btnSubmit { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; transition: 0.3s; text-transform: uppercase; }
        #btnSubmit:disabled { background: #ccc; cursor: not-allowed; }
        .back-home { display: block; text-align: center; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .ss-content .ss-list { max-height: 200px !important; }
        
        /* Style cho thông báo đóng form */
        .closed-message { text-align: center; padding: 20px; }
        .closed-message h3 { color: #d9534f; text-transform: uppercase; }
        .closed-message p { line-height: 1.6; color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <h2>ĐĂNG KÝ LEARN & SHARE</h2>
    
    <div id="formContent">
        <div class="form-group">
            <label>1. Chọn Kênh/Khối (PBC1) (*):</label>
            <select id="pbc1"></select>
        </div>
        
        <div class="form-group">
            <label>2. Chọn Khu vực/Phòng Ban/Quản lý (PBC2) (*):</label>
            <select id="pbc2"></select>
        </div>
        
        <div class="form-group">
            <label>3. Nội dung định hướng (Tự động hiển thị khi chọn Mục 2):</label>
            <textarea id="dinhHuong" rows="5" readonly 
                placeholder="Tự động hiển thị khi chọn Mục 2..." 
                style="background-color: #f0f4f1; color: #333; resize: none; border-left: 5px solid var(--primary);">
            </textarea>
        </div>
        
        <div class="form-group">
            <label>4. Nội dung chia sẻ dự kiến tháng này (*):</label>
            <textarea id="noiDung" rows="3" placeholder="Đơn vị bạn dự kiến chia sẻ nội dung gì?"></textarea>
        </div>
        
        <button id="btnSubmit" onclick="submitData()">GỬI ĐĂNG KÝ</button>
    </div>
    
    <a href="../index.html" class="back-home">⬅ Quay lại trang chủ</a>
</div>

<script>
    // Cập nhật API_URL mới nhất của bạn sau khi Deploy
    const API_URL = "https://script.google.com/macros/s/AKfycbzJSAuwWm95ivMYAyH7K0leycfGaL2edtyeAFXzqKm3maUnRwGHxHviKCPdjoMQCSxa1Q/exec";
    let ss1, ss2;

    document.addEventListener('DOMContentLoaded', () => {
        ss1 = new SlimSelect({
            select: '#pbc1',
            settings: { placeholderText: 'Tìm Kênh/Khối...', showSearch: true },
            events: { afterChange: (v) => { if(v[0].value) loadPBC2(v[0].value); } }
        });
        ss2 = new SlimSelect({
            select: '#pbc2',
            settings: { placeholderText: 'Tìm Khu vực/PB/Quản lý...', showSearch: true },
            events: { afterChange: (v) => { if(v[0].value) loadDinhHuong(v[0].value); } }
        });
        fetchData('getPBC1');
    });

    async function fetchData(action, params = '') {
        try {
            const res = await fetch(`${API_URL}?action=${action}${params}&v=${Date.now()}`);
            const data = await res.json();
            
            // KIỂM TRA TRẠNG THÁI FORM TỪ BACKEND
            if(data.error === "CLOSED") {
                displayClosedMessage(data.message);
                return;
            }

            if(action === 'getPBC1') {
                ss1.setData([{text: '-- Chọn Kênh/Khối --', value: ''}, ...data.map(i => ({text: i, value: i}))]);
            } 
            else if(action === 'getPBC2') {
                ss2.setData([{text: '-- Chọn Phòng ban --', value: ''}, ...data.map(i => ({text: i, value: i}))]);
            } 
            else if(action === 'getDinhHuong') {
                document.getElementById('dinhHuong').value = data;
            }
        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
        }
    }

    function displayClosedMessage(msg) {
        document.getElementById('formContent').innerHTML = `
            <div class="closed-message">
                <h3>Thông báo đóng cổng</h3>
                <p>${msg}</p>
                <button onclick="window.location.reload()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;">Tải lại trang</button>
            </div>
        `;
    }

    function loadPBC2(v) { 
        document.getElementById('dinhHuong').value = ""; 
        ss2.setData([{text: 'Đang tải danh sách...', value: ''}]);
        fetchData('getPBC2', `&pbc1=${encodeURIComponent(v)}`); 
    }

    function loadDinhHuong(v) { 
        document.getElementById('dinhHuong').value = "Đang lấy định hướng...";
        fetchData('getDinhHuong', `&pbc2=${encodeURIComponent(v)}`); 
    }

    function submitData() {
        const pbc1 = document.getElementById('pbc1').value;
        const pbc2 = document.getElementById('pbc2').value;
        const dinhHuong = document.getElementById('dinhHuong').value;
        const noiDungValue = document.getElementById('noiDung').value.trim();

        if(!pbc1 || !pbc2 || !noiDungValue) {
            return alert("⚠️ Vui lòng hoàn thành: Chọn Kênh, Phòng ban và Điền nội dung chia sẻ!");
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "ĐANG GỬI...";

        const payload = { pbc1, pbc2, dinhHuong, noiDung: noiDungValue };

        fetch(API_URL, { 
            method: 'POST', 
            body: JSON.stringify(payload) 
        })
        .then(res => res.text())
        .then(text => {
            if(text === "CLOSED_ERROR") {
                alert("⚠️ Đã hết thời gian đăng ký nội dung chia sẻ tháng này, anh chị vui lòng quay lại vào tháng sau nhé!");
                window.location.reload();
            } else {
                alert("🎉 Chúc mừng! Đăng ký Nội dung Learn & Share tháng thành công.");
                window.location.href = "../index.html"; 
            }
        })
        .catch(err => {
            console.error(err);
            alert("❌ Lỗi kết nối, vui lòng thử lại sau ít phút.");
            btn.disabled = false;
            btn.innerText = "GỬI ĐĂNG KÝ";
        });
    }
</script>
</body>
</html>
